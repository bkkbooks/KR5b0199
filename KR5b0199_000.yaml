body:
  text: 早朝師堂序立法事跪啓具位臣姓某上啓玄中教主玉虛明皇道君三天教主正一天師真君靈寶教主經籍度師真君監齊大法師真君太極左宫仙公真君九天都仙太史真君人天教主華蓋浮丘真君清微靈寶道德正一歷代師尊恭望師慈俯回洞鑒臣今欽奉綸音崇修玉籙薦揚大齊以今領衆升壇轉詠洞玄靈寶九天生神玉章第一過至第三過祈恩升薦某靈進登清靜旁資孤爽均證生方未敢自專先伸啓告伏願一卷必六師密授啓蒙之訓衆真監度我猶如侍坐之時干冒師嚴臣等下情不勝惶懼之至領衆升壇恭行典式唱道引至壇前序立降神王法事具位某上啓十方無極飛天神王長生大聖無量度人君飛天使者飛天吏兵侍衛經寶一切聖衆伏聞元始說經功昭垂於浩劫虛皇演教澤廣被於含靈某恪意遵行志心持誦周九過生神之典度一切沈滯之魂頒行符命之文普超靈識蠲潔蘋蘩之薦用表忱誠法衆如儀修齊奉請修齊奉請東方無極飛天神王降臨壇所南方西方北方東北東南西南西北上方下方雲輿向來啓請伏想羽節徘徊霓旌縹眇千乘萬騎勃勃浮空而來九鳳八鸞嗈嗈自天而下某等無任虔恭淨茶上獻具有誠疏謹用披宣宣疏焚化疏文披露聖聽昭回願周九轉之功共證一乘之妙神魂升度永超清靜之鄉苦爽沾恩盡覩光明之境某等不勝虔禱之至謹言升壇上香信禮默禮師存念如法請宣神呪七靈隱神三元混形變隂化陽外清內明洞徹太和九宫攝英飛丹鬱秀錬度八門脫胎却死七魄散分百神混合兆為帝賓鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十六人出關啓所言臣今入意願得太上十方正真生氣下降流注臣等身中令臣所啓速逹徑御無上至真三寶昊天王皇上帝東極救苦天尊九天生神上帝道前請稱法位具位臣姓某與禮官等謹同誠上啓太上無極大道虛無自然元始天尊玉宸道君靈寶天尊太上老君道德天尊統天元聖天尊尋聲救苦天尊朱陵度命天尊東華木公上相青童道君西靈金真萬氣祖母元君十方靈寶救苦天尊十方巳得道至真諸君丈人九天生神上帝三十二天上帝三皇五老上帝五福十神真君東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君上相上宰上保上傅四司五帝十方無極至真三十六部尊經神仙上清日月五星四曜南辰北斗萬象高真十方無極無量品至真大神飛天神王長生大聖無量度人君天真皇人妙行真人三元三官大帝九天採訪使者玄中大法師三天大法師靈寶三師真君周天列宿星君清微歷代宗師九天天曹諸司上聖北極四聖真君南昌上下宫朱陵火府黃籙院主宰三元真君度人不死諸位真君興生獨𨽻可韓功都聚魂五府真宰三界大勳魔王侍經五帝玉童玉女九天符使九天侍衛一切靈仙五嶽五天聖帝儲副佐理真君北隂酆都大帝九壘帝君五氣天君十宫真君三元宫府百二十曹考官椽吏十方九幽諸獄主者水府榑桑大帝暘谷神君九江水帝十二溪真雷霆雨部神祇法籙官君將吏巨天力士執罰神兵五帝直符六宫掾吏牛頭獄卒馬面大神玄都茭龍驛吏齎簡童子護戒威神三界直符四直功曹城隍里社正神侍香靈官直符宣通召命三界應感一切威靈臣聞靈寶本章總百魔隱韻之玄奧洞玄妙典敷九天生神之威儀神功與天地齊功大惠實死生蒙惠是為勝範普度無窮以今欽奉綸音崇修玉籙大齊幾書夜今則登壇轉誦洞玄靈寶九天生神玉章升薦某靈證果逍遙旁資苦爽均遂生方以今法事嚴陳琅函將啓敬伸謄奏仰冀鑒觀伏願三境髙明九天上聖同垂玄貺普賜洪恩俯降道場證盟修奉十方法界六合寰區五道衆生九幽諸獄以兹功德遍用莊嚴當願經寶宏宣幽關罷對淨魄蒙恩而上超道岸苦魂受錬而永離泉鄉冤對蠲除罪根落滅徑圓成於道果即度品於朱宮稽首皈依無極大道侍經白文三皈依宿命贊侍經開經敷座贊靜念如法寂寂至無宗請轉法輪師題經衆諷經畢侍經回向解座吟步虛旋行至子宫上香師白文伏聞位鎮坎宮校録鬼神之府威靈子位總司罪福之權應五氣以分輝憫羣生之淪沒以今欽奉綸音崇修玉籙升薦某靈超登清靜旁資苦爽均證生方今者誦詠寶章巳周一過祈玄恩而誕布度苦爽以超升伏願俯納虔祈特垂拯濟俾三塗開泰五苦停酸幽夜開光咸登彼岸具有疏文謹當宣告宣疏謹請鬱單無量天唐符使速出班次祗受公文宣關焚化侍經開經敷座贊請轉法輪師題經衆諷經畢侍經回向解座吟步虛旋行至坤宮上香師白文伏聞位當參位端居仁靜之鄉德運坤中流布梵陽之氣度人利物起死回生以今欽奉綸音崇修玉籙升薦某靈進登清靜旁資苦爽均證生方今者誦詠寶章巳周二過敬頒宣於恩命祈拔度於神魂伏願俯降大慈特從凡懇俾幽冥之開泰使道果以圎成具有疏文謹當宣告宣疏謹請上上禪善無量壽天劉符使速出班次祗受公文宣關焚化侍經開經敷座贊請轉法輪師題經衆諷經畢侍經回向解座吟步虛旋行至震宫上香師白文伏聞尊居卯位有情俱沐於玄恩德合震宫幽顯咸資於大化隨方應號無量度人以今欽奉綸音崇修玉籙升薦某靈超登清靜旁資苦爽均證生方今者誦詠寶章巳周三過敬頒宣於恩命祈拔度於神魂伏願上徹蒼旻俯憐丹悃證盟開度濟拔幽冥具有疏文謹當宣告宣疏謹請梵監須延天黃符使速出班次祗受公文宣關焚化三聞經還神燒香仙靈仙官金童玉女五帝五嶽神仙真人三氣正神左右龍虎君天仙地仙五靈香官當令召致十方正氣自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣等學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之誠速逹徑御無上至真三寶昊天玉皇上帝東極救苦天尊九天生神上帝道前下壇謝師具位臣姓某上啓玄中教主玉虛明皇道君三天教主正一天師真君靈寶教主經籍度師真君監齊大法師真君太極左宫仙公真君九州都仙太史真君人天教主華蓋浮丘真君清微道德正一歷代師尊恭望師慈俯昭謝悃臣適來升壇轉詠九天生神玉章祈恩升薦某靈進登清靜下及法界孤幽超出沈冥遷升仙界仰荷主維巳周三過徑伸謁謝尚冀成終伏願何福不臻悉入生門之度說經未竟少稽仙仗之留臨午行科别伸啓告臣等下情無任虔謝之至謹言向來念善午朝師堂序立法事跪啓伏以太陽洞明景煥三氣之蓊冥綵仗下凡筵想諸天之齊到門下具位臣姓某上啓玄中教主玉虛明皇道君三天教主正一天師真君靈寶教主經藉度師真君監齊大法師真君太極左宮仙公真君九州都仙太史真君人天教主華蓋浮丘真君清微靈寶道德正一歷代師尊恭望師慈俯回洞鑒臣今欽奉綸音崇修玉籙薦揚大齊以今領衆升壇轉詠洞玄靈寶九天生神玉章第四過至第六過祈恩升薦某靈上登福境下及法界孤爽出離幽冥遷升淨域未敢自專再伸啓告伏願七寶經臺常覩紫虛之鬱秀三清洞闕遙瞻梵氣之彌羅臣等干冒師嚴下情不勝惶懼之至領衆升壇恭行典式唱道升壇上香信禮默禮師存念如法請宣神呪元始開圖太玄肇靈虛極無象一氣流形化生二景五緯凝精混合自然怛除結嬰總真布景煥赫九清炎池廓奕七紀齊井祈師盧浩丹天耀精朱光鍊度赤靄散明三華鬱秀暉映帝宸鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十六人出關啓所言臣今入意願得太上十方正真生氣下降流注臣等身中令臣所啓速逹徑御無上至真三寶昊天玉皇上帝東極救苦天尊九天生神上帝道前請稱法位具位臣姓某與禮官等謹同誠上啓太上無極大道虛無自然元始天尊玉宸道君靈寶天尊太上老君道德天尊統天元聖天尊尋聲救苦天尊朱陵度命天尊東華木公上相青童道君西靈金真萬氣祖母元君十方靈寶救苦天尊十方巳得道至真諸君丈人九天生神上帝三十二天上帝三皇五老上帝五福十神真君東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君上相上宰上保上傅四司五帝十方無極至真三十六部尊經神仙上清日月五星四曜南辰北斗萬象高真十方無極無量品至真大神飛天神王長生大聖無量度人君天真皇人妙行真人三元三官大帝九天採訪使者玄中大法師三天大法師靈寶三師真君周天列宿星真清微歷代師君九天天曹諸司上聖北極四聖真君南昌上下宫朱陵火府黃籙院主宰三元真君度人不死諸位真君興生獨隸可韓功都聚魂五府真宰三界大勳魔王侍經五帝玉童玉女九天符使九天侍衛一切靈仙五嶽五天聖帝儲副佐理真君北隂酆都大帝九壘帝君五氣天君十宮真君三元宮府百二十曹考官掾吏十方九幽諸獄主者水府榑桑大帝暘谷神君九江水帝十二溪真雷霆雨部神祇法籙官君將吏巨天力士執罰神兵五帝直符六宫掾吏牛頭獄卒馬面大神玄都茭龍驛吏齎簡童子護戒威神三界直符四直功曹城隍里社正神侍香靈官直符宣通召命三界應感一切威靈臣聞三寶金書凝虛玄之妙氣九霄玉笈祕空洞之靈音內名混合於百神生根裁成於萬品導運御世唱恭奉而九氣結形乘晨希陽洞玄靈而七元返景洪惟元始凝妙虛無憫履九之告終矜函三之應㑹神景啓奧隱韻通玄上開天地之光下料死生之化希夷至極微妙難超仰功德之巍巍罄諶恂之切切以今欽奉綸音崇修玉籙大齊幾晝夜今則登壇轉詠洞玄靈寶九天生神玉章升薦某靈證景逍遙旁資苦爽均遂生方伏願慈光耀景玄極流輝出禁書於玉臺容其嘯詠開寶章於金格許以謡歌琅琅而逸響九遐鬱鬱而明聞三界即俾某靈性超死戶氣返本根乘大有之瓊音登妙無之寶界臣等稽首皈依無極大道侍經白文三皈依宿命贊侍經開經敷座贊靜念如法請轉法輪師題經衆諷經畢侍經回向解座吟步虛旋行至巽宫上香師白文伏聞位鎮巽宫上應神霄之境澤林地戶下通溟漠之鄉無量度人隨方設教以今欽奉綸音崇修玉籙升薦某靈進登清靜旁資苦爽均證生方今者誦詠寶章巳周四過敬頒宣於恩命祈拔度於死魂伏願俯憫哀悰大施玄造庶彰正化以副虔祈具有疏文謹當宣告宣疏謹請寂然兜術天彭符使速出班次祗受公文宣關焚化侍經開經敷座贊請轉法輪師題經衆諷經畢侍經回向解座吟步虛旋行至中央上香師白文伏聞道如天䨱獨總御於死生德若穹高較重輕之罪福曲憐亡爽願拯幽關以今欽奉綸音崇修玉籙升薦某靈進登清靜旁資苦爽均證生方今者誦詠寶章巳周五過奉真符而頒告祈惠澤以宣行伏願回駕鑒臨隨方應度庶使拘囚之衆咸登自在之天具有疏文謹當宣告宣疏謹請波羅尼密不驕樂天范符使速出班次祗受公文宣關焚化侍經開經敷座贊請轉法輪師題經衆諷經畢侍經回向解座吟步虛旋行至乾宫上香師白文伏聞威佐天行居福德大千之界德恢乾運度幽冥億劫之魂化應諸天功施無量以今欽奉綸音崇修玉籙升薦某靈超登清靜旁資苦爽均證生方今者誦詠寶章巳周六過賴玄恩而頒告祈聖澤以弘施伏願大道垂慈神光遍燭盡開明於長夜俾超度於仙鄉具有疏文謹當宣告宣疏謹請洞元化應聲天張符使速出班次祗受公文宣關焚化三聞經還神燒香仙靈仙官金童玉女五帝五嶽神仙真人三氣正神左右龍