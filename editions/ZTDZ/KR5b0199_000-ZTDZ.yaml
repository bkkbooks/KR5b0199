  text: 玉籙生神資度轉經儀率三
  hash: sha256:a562832a288fe26f935952d875417199fc458a6f7fd509a8b329a579c765a5ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0199_SJB_000-090148a, image: sjb/09/090148a.png}
body:
  text: 早朝師堂序立法事跪啓具位臣姓某上啓玄中教主玉虚明皇道君三天教主正一天師眞君靈寳教主經籍度師眞君監齋大法師眞君太極左宫仙公眞君九天都仙太史眞君人天教主華蓋浮丘眞君清微靈寳道德正一歷代師尊恭望師慈俯囘洞鑒臣今欽奉綸音崇修玉籙薦揚大齋以今領衆陞壇轉詠洞玄靈寳九天生神玉章第一過至第三過祈恩昇薦某靈進登清靜旁資孤爽均證生方未敢自專先伸啓吿伏願一卷必六師宻授啓蒙之訓衆眞監度我猶如侍坐之時干冒師嚴臣等下情不勝惶懼之至領衆陞壇恭行典式唱道引至壇前序立降神王法事具位某上啓十方無極飛天神王長生大聖無量度人君飛天使者飛天吏兵侍衞經寳一切聖衆伏聞元始說經功昭垂於浩劫虚皇演教澤廣被於含靈某恪意遵行志心持誦周九過生神之典度一切沈滯之魂頒行符命之文普超靈識蠲潔蘋蘩之薦用表忱誠法衆如儀修齋奉請修齋奉請東方無極飛天神王降臨壇所南方西方北方東北東南西南西北上方下方雲輿向來啓請伏想羽節徘徊霓旌縹緲千乘萬騎勃勃浮空而來九鳳八鸞嗈嗈自天而下某等無任虔恭淨茶上獻具有誠䟽謹用披宣宣䟽焚化䟽文披露聖聴昭囘願周九轉之功共證一乘之妙神魂升度永超清靜之鄉苦爽沾恩盡覩光明之境某等不勝虔禱之至謹言陞壇上香信禮黙禮師存念如法請宣神呪七靈隱神三元混形變隂化陽外清内明洞徹太和九宫攝英飛丹鬱秀錬度八門脫胎却死七魄散分百神混合兆爲帝賓鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十六人出關啓所言臣今入意願得太上十方正眞生炁下降流注臣等身中令臣所啓速逹徑御無上至眞三寳昊天王皇上帝東極救苦天尊九天生神上帝道前請稱法位具位臣姓某與禮官等謹同誠上啓太上無極大道虚無自然元始天尊玉宸道君靈寳天尊太上老君道德天尊統天元聖天尊尋聲救苦天尊朱陵度命天尊東華木公上相青童道君西靈金眞萬炁祖母元君十方靈寳救苦天尊十方巳得道至眞諸君丈人九天生神上帝三十二天上帝三皇五老上帝五福十神眞君東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君上相上宰上保上傅四司五帝十方無極至眞三十六部尊經神仙上清日月五星四曜南辰北斗萬象高眞十方無極無量品至眞大神飛天神王長生大聖無量度人君天眞皇人妙行眞人三元三官大帝九天採訪使者玄中大法師三天大法師靈寳三師眞君周天列宿星君清微歷代宗師九天天曹諸司上聖北極四聖眞君南昌上下宫朱陵火府黄籙院主宰三元眞君度人不死諸位眞君興生獨𨽻可韓功都聚魂五府眞宰三界大勲魔王侍經五帝玉童玉女九天符使九天侍衞一切靈仙五嶽五天聖帝儲副佐理眞君北隂酆都大帝九壘帝君五炁天君十宫眞君三元宫府百二十曹考官椽吏十方九幽諸獄主者水府榑桑大帝暘谷神君九江水帝十二谿眞雷霆雨部神祇法籙官君將吏巨天力士執罰神兵五帝直符六宫掾吏牛頭獄卒馬面大神玄都茭龍驛吏齎簡童子護戒威神三界直符四直功曹城隍里社正神侍香靈官直符宣通召命三界應感一切威靈臣聞靈寳本章總百魔隱韻之玄奥洞玄妙典敷九天生神之威儀神功與天地齊功大惠實死生蒙惠是爲勝範普度無窮以今欽奉綸音崇修玉籙大齋幾書夜今則登壇轉誦洞玄靈寳九天生神玉章昇薦某靈證果逍遥旁資苦爽均遂生方以今法事嚴陳琅函將啓敬伸謄奏仰冀鑒觀伏願三境髙明九天上聖同垂玄貺普賜洪恩俯降道場證盟修奉十方法界六合寰區五道衆生九幽諸獄以兹功德徧用莊嚴當願經寳宏宣幽關罷對淨魄蒙恩而上超道岸苦魂受錬而永離泉鄉冤對蠲除罪根落滅徑圓成於道果即度品於朱宮稽首皈依無極大道侍經白文三皈依宿命賛侍經開經敷座賛靜念如法寂寂至無宗請轉法輪師題經衆諷經畢侍經回向解座吟歩虚旋行至子宫上香師白文伏聞位鎭坎宮校錄鬼神之府威靈子位総司罪福之權應五氣以分輝憫羣生之淪没以今欽奉綸音崇修玉籙昇薦某靈超登清靜旁資苦爽均證生方今者誦詠寳章巳周一過祈玄恩而誕布度苦爽以超昇伏願俯納虔祈特垂拯濟俾三塗開泰五苦停酸幽夜開光咸登彼岸具有䟽文謹當宣吿宣䟽謹請鬱單無量天唐符使速出班次祗受公文宣關焚化侍經開經敷座賛請轉法輪師題經衆諷經畢侍經囘向解座吟歩虚旋行至坤宮上香師白文伏聞位當參位端居仁靜之鄕德運坤中流布梵陽之炁度人利物起死囘生以今欽奉綸音崇修玉籙昇薦某靈進登清靜旁資苦爽均證生方今者誦詠寳章巳周二過敬頒宣於恩命祈拔度於神魂伏願俯降大慈特從凡懇俾幽冥之開泰使道果以圎成具有䟽文謹當宣吿宣䟽謹請上上禪善無量壽天劉符使速出班次祗受公文宣關焚化侍經開經敷座賛請轉法輪師題經衆諷經畢侍經囘向解座吟歩虚旋行至震宫上香師白文伏聞尊居卯位有情俱沐於玄恩德合震宫幽顯咸資於大化隨方應號無量度人以今欽奉綸音崇修玉籙昇薦某靈超登清靜旁資苦爽均證生方今者誦詠寳章巳周三過敬頒宣於恩命祈拔度於神魂伏願上徹蒼旻俯憐丹悃證盟開度濟拔幽㝠具有䟽文謹當宣告宣䟽謹請梵監須延天黄符使速出班次祗受公文宣關焚化三聞經還神燒香仙靈仙官金童玉女五帝五嶽神仙眞人三炁正神左右龍虎君天仙地仙五靈香官當令召致十方正炁自然生金液丹碧芝英百靈衆眞交㑹在此香火鑪前令臣等學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之誠速逹徑御無上至眞三寳昊天玉皇上帝東極救苦天尊九天生神上帝道前下壇謝師具位臣姓某上啓玄中教主玉虚明皇道君三天教主正一天師眞君靈寳教主經籍度師眞君監齋大法師眞君太極左宫仙公眞君九州都仙太史眞君人天教主華蓋浮丘眞君清微道德正一歷代師尊恭望師慈俯昭謝悃臣適來陞壇轉詠九天生神玉章祈恩昇薦某靈進登清靜下及法界孤幽超出沈冥遷昇仙界仰荷主維巳周三過徑伸謁謝尚冀成終伏願何福不臻悉入生門之度說經未竟少稽仙仗之留臨午行科别伸啓告臣等下情無任虔謝之至謹言向來念善午朝師堂序立法事跪啓伏以太陽洞明景煥三炁之蓊冥綵仗下凡筵想諸天之齊到門下具位臣姓某上啓玄中教主玉虚明皇道君三天教主正一天師眞君靈寳教主經藉度師眞君監齋大法師眞君太極左宮仙公眞君九州都仙太史眞君人天教主華蓋浮丘眞君清微靈寳道德正一歷代師尊恭望師慈俯囘洞鑒臣今欽奉綸音崇修玉籙薦揚大齋以今領衆陞壇轉詠洞玄靈寳九天生神玉章第四過至第六過祈恩昇薦某靈上登福境下及法界孤爽岀離幽冥遷昇淨域未敢自專再伸啓告伏願七寳經臺常覩紫虚之鬱秀三清洞闕遥瞻梵炁之彌羅臣等干冒師嚴下情不勝惶懼之至領衆陞壇恭行典式唱道陞壇上香信禮黙禮師存念如法請宣神呪元始開圖太玄肇靈虚極無象一氣流形化生二景五緯凝精混合自然怛除結嬰總眞布景煥赫九清炎池廓奕七紀齊井祈師盧浩丹天耀精朱光鍊度赤靄散明三華鬱秀暉映帝宸鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十六人出關啓所言臣今入意願得太上十方正眞生炁下降流注臣等身中令臣所啓速逹徑御無上至眞三寳昊天玉皇上帝東極救苦天尊九天生神上帝道前請稱法位具位臣姓某與禮官等謹同誠上啓太上無極大道虚無自然元始天尊玉宸道君靈寳天尊太上老君道德天尊統天元聖天尊尋聲救苦天尊朱陵度命天尊東華木公上相青童道君西靈金眞萬炁祖母元君十方靈寳救苦天尊十方巳得道至眞諸君丈人九天生神上帝三十二天上帝三皇五老上帝五福十神眞君東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君上相上宰上保上傅四司五帝十方無極至眞三十六部尊經神仙上清日月五星四曜南辰北斗萬象高眞十方無極無量品至眞大神飛天神王長生大聖無量度人君天眞皇人妙行眞人三元三官大帝九天採訪使者玄中大法師三天大法師靈寳三師眞君周天列宿星眞清微歷代師君九天天曹諸司上聖北極四聖眞君南昌上下宫朱陵火府黄籙院主宰三元眞君度人不死諸位眞君興生獨隷可韓功都聚魂五府眞宰三界大勲魔王侍經五帝玉童玉女九天符使九天侍衛一切靈仙五嶽五天聖帝儲副佐理眞君北隂酆都大帝九壘帝君五炁天君十宮眞君三元宮府百二十曹考官掾吏十方九幽諸獄主者水府榑桑大帝暘谷神君九江水帝十二谿眞雷霆雨部神祇法籙官君將吏巨天力士執罰神兵五帝直符六宫掾吏牛頭獄卒馬面大神玄都茭龍驛吏齎簡童子䕶戒威神三界直符四直功曹城隍里社正神侍香靈官直符宣通召命三界應感一切威靈臣聞三寳金書凝虚玄之妙炁九霄玉笈祕空洞之靈音内名混合於百神生根裁成於萬品導運御世唱恭奉而九炁結形乗晨希陽洞玄靈而七元返景洪惟元始凝妙虚無憫履九之告終矜函三之應㑹神景啓奧隱韻通玄上開天地之光下料死生之化希夷至極微妙難超仰功德之巍巍罄諶恂之切切以今欽奉綸音崇修玉籙大齋幾晝夜今則登壇轉詠洞玄靈寳九天生神玉章昇薦某靈證景逍遥旁資苦爽均遂生方伏願慈光耀景玄極流輝出禁書於玉臺容其嘯詠開寳章於金格許以謡歌琅琅而逸響九遐鬱鬱而明聞三界即俾某靈性超死戸氣返本根乗大有之瓊音登妙無之寳界臣等稽首皈依無極大道侍經白文三皈依宿命賛侍經開經敷座賛靜念如法請轉法輪師題經衆諷經畢侍經回向解座吟歩虚旋行至巽宫上香師白文伏聞位鎭巽宫上應神霄之境澤林地戸下通溟漠之鄕無量度人隨方設教以今欽奉綸音崇修玉籙昇薦某靈進登清靜旁資苦爽均證生方今者誦詠寳章巳周四過敬頒宣於恩命祈拔度於死魂伏願俯憫哀悰大施玄造庶彰正化以副虔祈具有䟽文謹當宣吿宣䟽謹請寂然兠術天彭符使速出班次祗受公文宣關焚化侍經開經敷座賛請轉法輪師題經衆諷經畢侍經囘向解座吟歩虚旋行至中央上香師白文伏聞道如天䨱獨總御於死生德若穹高較重輕之罪福曲憐亡爽願拯幽關以今欽奉綸音崇修玉籙昇薦某靈進登清靜旁資苦爽均證生方今者誦詠寳章巳周五過奉眞符而頒吿祈惠澤以宣行伏願迴駕鑒臨隨方應度庶使拘囚之衆咸登自在之天具有䟽文謹當宣吿宣䟽謹請波羅尼宻不驕樂天范符使速出班次祗受公文宣關焚化侍經開經敷座賛請轉法輪師題經衆諷經畢侍經囘向解座吟歩虚旋行至乾宫上香師白文伏聞威佐天行居福德大千之界德恢乾運度幽冥億劫之魂化應諸天功施無量以今欽奉綸音崇修玉籙昇薦某靈超登清靜旁資苦爽均證生方今者誦詠寳章巳周六過賴玄恩而頒吿祈聖澤以弘施伏願大道垂慈神光徧燭盡開明於長夜俾超度於仙鄕具有䟽文謹當宣吿宣䟽謹請洞元化應聲天張符使速出班次祗受公文宣關焚化三聞經還神燒香仙靈仙官金童玉女五帝五嶽神仙眞人三炁正神左右龍