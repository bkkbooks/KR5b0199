方今者誦詠寳章巳周九過廣玄恩以宣吿下冥府而奉行伏願體上帝之好生施大慈而救苦拔神靈於九夜度幽爽於重關具有䟽文謹當宣吿宣䟽謹請無想無結無愛天潘符使速出班次祗受公文宣關焚化侍經嘆經三聞經師收經賛收經得道隨念徃生無盡玄功無邊惠澤伏願解分宿對縁㑹當來不墮三途悉蠲八難稽首皈依無上道寳收經得道隨念徃生無量洪恩無邊聖力伏願潜停輪轉永斷牽纏惡趣騰輝神魂受鍊稽首皈依無上經寳收經得道隨念徃生無極良緣無窮妙力伏願四司無滯九署潜通魂度朱陵神遊紫府稽首皈依無上師寳還神燒香仙靈仙官金童玉女五帝五嶽神仙眞人三炁正神左右龍虎君天仙地仙五靈香官當令召致十方正炁自然生金液丹碧芝英百靈衆眞交㑹在此香火鑪前令臣學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之誠速逹徑御無上至眞三寳昊天玉皇上帝東極救苦天尊九天生神上帝道前謝神王重稱法位具位臣姓某上啓十方無極飛天神王使者飛天吏兵聖衆恭望祥光俯囘洞鑒切以九過生神亶賴唱恭之惠三乗演妙克承開宥之功昨爲欽奉綸音崇修玉籙大齋昇薦某靈上登福境旁資苦爽均證生方向來領衆陞壇轉詠洞玄靈寳九天生神玉章巳周九過匪由聖造曷遂圎隆庸罄微衷重殫誠悃䟽文叩誦恭對披宣宣䟽宣關䟽文宣讀諒逹淵聦伏願監眞度生尚匃尋聲而救苦傾光迴駕滿祈應世以度人無任瞻依不勝眷戀某等再拜恭虔一心奉送修齋雲輿送出焚燎謝師具位臣姓某上啓玄中教主玉虚明皇道君三天教主正一天師眞君靈寳教主經籍度師眞君監齋大法師眞君太極左宮仙公眞君九州都仙太史眞君人天教主華蓋浮丘眞君清微靈寳道德正一歷代師尊恭望師慈俯囘洞鑒臣向來陞壇轉詠洞玄靈寳九天生神玉章昇薦某靈進登福境旁資苦爽均證生方仰荷主維功成九過懼形神之未㝎顧念慮之有差所冀寬原庶成善果伏願帝臨無貳天誘其衷開度受生魂咸離幽隂之境應會感靈數俾全交泰之功干冒師嚴臣等下情不勝惶懼虔謝之至謹言修齋雲輿玉籙生神資度轉經儀
